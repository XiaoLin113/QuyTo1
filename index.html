<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quỹ chung (Online)</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
.container { max-width:900px; margin:auto; padding:15px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}

table { width:100%; border-collapse:collapse; }
th, td { padding:8px; border-bottom:1px solid #ddd; text-align:center; }
.income { color:green; }
.expense { color:red; }
.hidden { display:none; }
.topbar { display:flex; justify-content:space-between; }

</style>

<body>

1. Đảm bảo file này tên là: index.html
2. Đặt ở THƯ MỤC GỐC của repo (không nằm trong folder khác)

<div class="container">

<div class="topbar">
<h2>Quỹ Tổ Sản Xuất 1 - Điện Lực Kiến Xương</h2>
<div>
<button id="loginBtn">Đăng nhập</button>
<button id="logoutBtn" class="hidden">Đăng xuất</button>
</div>
</div>

<div id="warn" class="card warn hidden">⚠️ Chưa cấu hình Firebase</div>

<div id="loginBox" class="card hidden">
<input type="text" id="username" placeholder="Tên đăng nhập">
<input type="password" id="password" placeholder="Mật khẩu">
<button id="loginSubmit">Đăng nhập</button>
</div>

<div class="card">
<h3>Tổng quỹ: <span id="total">0</span> VNĐ</h3>
<p style="color:green">Tiền vào: <span id="totalIncome">0</span> VNĐ</p>
<p style="color:red">Tiền ra: <span id="totalExpense">0</span> VNĐ</p>
</div>

<div id="adminPanel" class="card hidden">
<textarea id="desc" placeholder="Nội dung"></textarea>
<input type="text" id="amount" placeholder="Số tiền">
<select id="type">
<option value="income">Tiền vào</option>
<option value="expense">Tiền ra</option>
</select>
<button id="addBtn">Thêm</button>
<button id="exportBtn">📥 Xuất Excel</button>
</div>

<div class="card">
<h3>Tiền vào</h3>
<table>
<thead><tr><th>Ngày</th><th>Nội dung</th><th>Số tiền</th><th class="adminOnly">Xóa</th></tr></thead>
<tbody id="incomeList"></tbody>
</table>
</div>

<div class="card">
<h3>Tiền ra</h3>
<table>
<thead><tr><th>Ngày</th><th>Nội dung</th><th>Số tiền</th><th class="adminOnly">Xóa</th></tr></thead>
<tbody id="expenseList"></tbody>
</table>
</div>

</div>

<script>
// ===== CONFIG FIREBASE =====
const firebaseConfig = {
    apiKey: "AIzaSyA18QOQP5Npb-YjeoqaxSQDb8SL3UE-lE4",
    authDomain: "quyto-2ac7d.firebaseapp.com",
    projectId: "quyto-2ac7d",
    storageBucket: "quyto-2ac7d.firebasestorage.app",
    messagingSenderId: "343716551161",
    appId: "1:343716551161:web:c71cee317cf913cf984528",
    measurementId: "G-4Q5KC7QNTV"
  };

let db = null;
if(firebaseConfig.apiKey.includes("YOUR_")){
  document.getElementById('warn').classList.remove('hidden');
}else{
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}

// ===== BIẾN =====
const ADMIN_USER = "To1";
const ADMIN_PASS = "Nhieutien$2026";
let isAdmin = false;
let allData = [];

// DOM
const totalEl = document.getElementById('total');
const totalIncomeEl = document.getElementById('totalIncome');
const totalExpenseEl = document.getElementById('totalExpense');
const incomeList = document.getElementById('incomeList');
const expenseList = document.getElementById('expenseList');
const desc = document.getElementById('desc');
const amount = document.getElementById('amount');
const type = document.getElementById('type');
const adminPanel = document.getElementById('adminPanel');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const loginBox = document.getElementById('loginBox');

// ===== EVENT =====
loginBtn.onclick = () => loginBox.classList.toggle('hidden');
logoutBtn.onclick = logout;
document.getElementById('loginSubmit').onclick = login;
document.getElementById('addBtn').onclick = addTransaction;
document.getElementById('exportBtn').onclick = exportExcel;

// ===== LOGIN =====
function login(){
  let user = document.getElementById('username').value;
  let pass = document.getElementById('password').value;

  if(user === ADMIN_USER && pass === ADMIN_PASS){
    isAdmin = true;
    adminPanel.classList.remove('hidden');
    loginBtn.classList.add('hidden');
    logoutBtn.classList.remove('hidden');
    loginBox.classList.add('hidden');
  } else alert('Sai tài khoản');
}

function logout(){
  isAdmin = false;
  adminPanel.classList.add('hidden');
  loginBtn.classList.remove('hidden');
  logoutBtn.classList.add('hidden');
}

// ===== FORMAT =====
amount.addEventListener('input', ()=>{
  let v = amount.value.replace(/,/g,'').replace(/\D/g,'');
  if(!v) return amount.value='';
  amount.value = Number(v).toLocaleString('vi-VN');
});

function formatDate(){ return new Date().toLocaleString('vi-VN'); }

// ===== RENDER =====
function render(snapshot){
  incomeList.innerHTML='';
  expenseList.innerHTML='';
  allData=[];

  let total=0,income=0,expense=0;

  snapshot.forEach(doc=>{
    let d = doc.data()||{};
    let amt = Number(d.amount)||0;
    let t = d.type||'income';

    allData.push({...d,id:doc.id});

    let row = `<tr>
      <td>${d.date||''}</td>
      <td>${d.desc||''}</td>
      <td class="${t}">${amt.toLocaleString()}</td>
      <td>${isAdmin?`<button onclick="remove('${doc.id}')">X</button>`:''}</td>
    </tr>`;

    if(t==='income'){ incomeList.innerHTML+=row; total+=amt; income+=amt; }
    else{ expenseList.innerHTML+=row; total-=amt; expense+=amt; }
  });

  totalEl.innerText = total.toLocaleString();
  totalIncomeEl.innerText = income.toLocaleString();
  totalExpenseEl.innerText = expense.toLocaleString();
}

// ===== FIRESTORE =====
if(db){
  db.collection("fund").onSnapshot(render, err=>{
    console.error(err);
    alert("Lỗi Firebase (check rules hoặc config)");
  });
}

// ===== CRUD =====
function addTransaction(){
  if(!isAdmin || !db) return;

  let raw = amount.value.replace(/,/g,'');
  let val = parseInt(raw);

  if(!desc.value || !val) return alert('Thiếu dữ liệu');

  db.collection("fund").add({
    desc: desc.value,
    amount: val,
    type: type.value,
    date: formatDate()
  });

  desc.value=''; amount.value='';
}

function remove(id){
  if(db && confirm('Xóa?')) db.collection("fund").doc(id).delete();
}

// ===== EXPORT EXCEL =====
function exportExcel(){
  if(!isAdmin) return alert('Chỉ admin');
  if(!allData.length) return alert('Không có dữ liệu');

  let data = allData.map(i=>({
    "Ngày": i.date||'',
    "Nội dung": i.desc||'',
    "Loại": i.type==='income'?'Tiền vào':'Tiền ra',
    "Số tiền": Number(i.amount)||0
  }));

  let ws = XLSX.utils.json_to_sheet(data);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "QuyTo");
  XLSX.writeFile(wb, "quy_to.xlsx");
}
</script>
</body>
</html>
